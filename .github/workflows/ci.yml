name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install -r requirements-dev.txt
    - name: Run tests
      run: |
        export PYTHONPATH=.
        pytest tests/ -v
